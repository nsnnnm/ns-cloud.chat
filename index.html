<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Free Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#181818;
  border-bottom:1px solid #333;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg { margin:8px 0; }
.name { color:#4fc3f7; font-weight:bold; }

img {
  max-width:200px;
  border-radius:8px;
  margin-top:5px;
}

#bottom {
  display:flex;
  gap:5px;
  padding:10px;
  background:#181818;
  border-top:1px solid #333;
}

input {
  flex:1;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:6px;
}

button {
  padding:10px;
  background:#4fc3f7;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#plus {
  position:fixed;
  top:10px;
  left:10px;
  background:#ff9800;
}
</style>
</head>

<body>

<button id="plus">＋</button>

<div id="top">
  <div id="username"></div>
  <div>👥 <span id="count">0</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="msg" placeholder="メッセージ...">
  <button onclick="send()">送信</button>
  <input type="file" id="file" accept="image/*">
</div>

<script>
const WORKER_URL = "wss://ns-cloud-chat-worler.nekosuke-1012.workers.dev";

// ===== 名前 =====
let name = localStorage.getItem("name");
if (!name) {
  name = prompt("名前を入力");
  if (!name) name = "名無し";
  localStorage.setItem("name", name);
}
document.getElementById("username").textContent = name;

// 名前変更
document.getElementById("username").onclick = () => {
  const n = prompt("名前変更", name);
  if (n) {
    name = n;
    localStorage.setItem("name", name);
    document.getElementById("username").textContent = name;
  }
};

// ===== 通知 =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

function notify(title, body){
  if (Notification.permission === "granted") {
    new Notification(title, { body });
  }
}

// ===== ルーム =====
const room = location.pathname;

// ===== WebSocket =====
const ws = new WebSocket(`${WORKER_URL}?room=${room}`);

const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const countEl = document.getElementById("count");

// ===== 受信 =====
ws.onmessage = (e) => {
  const data = JSON.parse(e.data);

  if (data.type === "history") {
    chat.innerHTML = "";
    data.messages.forEach(addMessageToUI);
    return;
  }

  if (data.type === "msg" || data.type === "img") {
    addMessage(data);

    if (data.name !== name) {
      notify(data.name, data.text || "画像が送信されました");
    }
  }

  if (data.type === "count") {
    countEl.textContent = data.count;
  }

  if (data.type === "read") {
    showRead(data);
  }
};

// ===== 送信 =====
function send(){
  const text = input.value.trim();
  if (!text) return;

  ws.send(JSON.stringify({
    type:"msg",
    name:name,
    text:text
  }));

  input.value = "";
}

// Enter送信
input.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});

// ===== 画像送信（catbox） =====
document.getElementById("file").onchange = async () => {
  const file = document.getElementById("file").files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("reqtype", "fileupload");
  formData.append("fileToUpload", file);

  try {
    const res = await fetch("https://catbox.moe/user/api.php", {
      method: "POST",
      body: formData
    });

    const url = await res.text();

    ws.send(JSON.stringify({
      type:"img",
      name:name,
      img:url.trim()
    }));

  } catch {
    alert("アップロード失敗");
  }
};

// ===== 表示 =====
function addMessage(data){
  addMessageToUI(data);

  // 既読送信
  ws.send(JSON.stringify({
    type:"read",
    name:name
  }));
}

function addMessageToUI(data){
  let html = `<div class="msg"><span class="name">${escape(data.name)}</span>: `;

  if (data.type === "msg") {
    html += escape(data.text);
  }

  if (data.type === "img") {
    html += `<br><img src="${data.img}">`;
  }

  html += "</div>";

  chat.innerHTML += html;
  chat.scrollTop = chat.scrollHeight;
}

// ===== 既読表示 =====
function showRead(data){
  const el = document.createElement("div");
  el.style.fontSize="10px";
  el.style.color="#aaa";
  el.textContent = `${data.name}が既読`;
  chat.appendChild(el);
}

// ===== ルーム作成 =====
document.getElementById("plus").onclick = () => {
  const id = Math.random().toString(36).slice(2,10);
  location.href = "/" + id;
};

// ===== エスケープ =====
function escape(str){
  return str.replace(/[&<>"']/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[s]));
}
</script>

</body>
</html>
