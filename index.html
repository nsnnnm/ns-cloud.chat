<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:#0f0f0f; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; height:100vh;}
#top { display:flex; justify-content:space-between; padding:10px; background:#181818;}
#chat { flex:1; overflow:auto; padding:10px;}
.msg { margin:8px 0;}
.name { color:#4fc3f7;}
img { max-width:200px; border-radius:8px;}
#bottom { display:flex; gap:5px; padding:10px; background:#181818;}
input { flex:1; padding:10px; background:#222; border:none; color:white;}
button { padding:10px; background:#333; color:white; border:none;}
</style>
</head>

<body>

<div id="top">
  <div id="username"></div>
  <div>
    👥 <span id="count">0</span>
    <button onclick="newRoom()">＋</button>
    <button onclick="startCall()">📞</button>
  </div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="msg">
  <button onclick="send()">送信</button>
  <input type="file" id="file">
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
const WORKER = "wss://ns-cloud-chat-worler.nekosuke-1012.workers.dev";

let name = localStorage.getItem("name");
if (!name) {
  name = prompt("名前") || "名無し";
  localStorage.setItem("name", name);
}
username.textContent = name;

const room = location.pathname;
const ws = new WebSocket(`${WORKER}?room=${room}`);
const chat = document.getElementById("chat");

// ===== 通知許可 =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// ===== WebRTC =====
let pc = new RTCPeerConnection();
let localStream;

async function startCall() {
  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({type:"offer", offer}));
}

pc.ontrack = e => {
  remoteAudio.srcObject = e.streams[0];
};

pc.onicecandidate = e => {
  if (e.candidate) {
    ws.send(JSON.stringify({type:"ice", candidate:e.candidate}));
  }
};

// ===== 受信 =====
ws.onmessage = async (e) => {
  const data = JSON.parse(e.data);

  if (data.type === "history") {
    chat.innerHTML = "";
    data.messages.forEach(addMessage);
    return;
  }

  if (data.type === "msg" || data.type === "img") {
    addMessage(data);

    if (document.hidden && Notification.permission === "granted") {
      new Notification(data.name + ": " + (data.text || "画像"));
    }

    ws.send(JSON.stringify({type:"read"}));
  }

  if (data.type === "count") {
    count.textContent = data.count;
  }

  // ===== 通話 =====
  if (data.type === "offer") {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    await pc.setRemoteDescription(data.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({type:"answer", answer}));
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.type === "ice") {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }
};

// ===== 送信 =====
function send(){
  const text = msg.value;

  ws.send(JSON.stringify({
    type:"msg",
    name:name,
    text:text
  }));

  msg.value = "";
}

// ===== 画像 =====
file.onchange = async () => {
  const f = file.files[0];

  const form = new FormData();
  form.append("reqtype","fileupload");
  form.append("fileToUpload", f);

  const res = await fetch("https://catbox.moe/user/api.php", {
    method:"POST",
    body:form
  });

  const url = await res.text();

  ws.send(JSON.stringify({
    type:"img",
    name:name,
    img:url.trim()
  }));
};

// ===== 表示 =====
function addMessage(d){
  let html = `<div class="msg"><span class="name">${d.name}</span>:`;

  if (d.type === "msg") html += d.text;
  if (d.type === "img") html += `<br><img src="${d.img}">`;

  html += "</div>";

  chat.innerHTML += html;
}

// ===== ルーム作成 =====
function newRoom(){
  const id = prompt("ルーム名");
  if (id) location.href = "/" + id;
}
</script>

</body>
</html>
