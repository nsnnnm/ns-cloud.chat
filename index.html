<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Google</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#top {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#181818;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg { margin:8px 0; }
.name { color:#4fc3f7; }

img {
  max-width:200px;
  border-radius:8px;
}

#bottom {
  display:flex;
  padding:10px;
  background:#181818;
}

input {
  flex:1;
  padding:10px;
  background:#222;
  border:none;
  color:white;
}

button {
  padding:10px;
}
</style>
</head>

<body>

<div id="top">
  <div id="username"></div>
  <div>👥 <span id="count">0</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="msg">
  <button onclick="send()">送信</button>
  <input type="file" id="file">
</div>

<script>
const WORKER = "wss://ns-cloud-chat-worler.nekosuke-1012.workers.dev";

let name = localStorage.getItem("name");
if (!name) {
  name = prompt("名前") || "名無し";
  localStorage.setItem("name", name);
}
document.getElementById("username").textContent = name;

const room = location.pathname;

const ws = new WebSocket(`${WORKER}?room=${room}`);

const chat = document.getElementById("chat");

// ===== 受信 =====
ws.onmessage = (e) => {
  const data = JSON.parse(e.data);

  // 🔥 これ最重要（履歴）
  if (data.type === "history") {
    chat.innerHTML = "";
    data.messages.forEach(addMessageToUI);
    return;
  }

  if (data.type === "msg" || data.type === "img") {
    addMessage(data);
  }

  if (data.type === "count") {
    document.getElementById("count").textContent = data.count;
  }
};

// ===== 送信 =====
function send(){
  const text = document.getElementById("msg").value;

  ws.send(JSON.stringify({
    type:"msg",
    name:name,
    text:text
  }));

  document.getElementById("msg").value = "";
}

// ===== 画像（catbox） =====
document.getElementById("file").onchange = async () => {
  const file = document.getElementById("file").files[0];

  const form = new FormData();
  form.append("reqtype","fileupload");
  form.append("fileToUpload", file);

  const res = await fetch("https://catbox.moe/user/api.php", {
    method:"POST",
    body:form
  });

  const url = await res.text();

  ws.send(JSON.stringify({
    type:"img",
    name:name,
    img:url.trim()
  }));
};

// ===== 表示 =====
function addMessage(data){
  addMessageToUI(data);
}

function addMessageToUI(data){
  let html = `<div class="msg"><span class="name">${data.name}</span>: `;

  if (data.type === "msg") {
    html += data.text;
  }

  if (data.type === "img") {
    html += `<br><img src="${data.img}">`;
  }

  html += "</div>";

  chat.innerHTML += html;
}
</script>

</body>
</html>
