<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Cloud Chat+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#top {
  padding:10px;
  background:#181818;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #333;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg { margin:8px 0; }
.name { color:#4fc3f7; font-weight:bold; }

img {
  max-width:200px;
  border-radius:8px;
  margin-top:5px;
}

#bottom {
  display:flex;
  padding:10px;
  background:#181818;
  border-top:1px solid #333;
}

input {
  flex:1;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:6px;
}

button {
  margin-left:6px;
  padding:10px;
  background:#4fc3f7;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="top">
  <div id="username">未設定</div>
  <div>👥 <span id="count">0</span></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="msg" placeholder="メッセージ...">
  <button onclick="send()">送信</button>
  <input type="file" id="file" accept="image/*">
</div>

<script>
const WORKER_URL = "wss://ns-cloud-chat-worler.nekosuke-1012.workers.dev";

const chat = document.getElementById("chat");
const countEl = document.getElementById("count");
const input = document.getElementById("msg");
const fileInput = document.getElementById("file");
const usernameEl = document.getElementById("username");

// ===== 名前管理 =====
let name = localStorage.getItem("name");

if (!name) {
  name = prompt("名前を入力してください");
  if (!name) name = "名無し";
  localStorage.setItem("name", name);
}

usernameEl.textContent = name;

// 名前変更
usernameEl.onclick = () => {
  const newName = prompt("名前変更", name);
  if (newName) {
    name = newName;
    localStorage.setItem("name", name);
    usernameEl.textContent = name;
  }
};

// ===== 部屋 =====
const room = location.pathname;

// ===== WebSocket =====
const ws = new WebSocket(`${WORKER_URL}?room=${room}`);

// ===== 履歴読み込み =====
const history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
history.forEach(addMessageToUI);

// ===== 受信 =====
ws.onmessage = (e) => {
  const data = JSON.parse(e.data);

  if (data.type === "msg") {
    addMessage(data);
  }

  if (data.type === "count") {
    countEl.textContent = data.count;
  }
};

// ===== 送信 =====
function send(){
  const text = input.value.trim();
  if (!text) return;

  const data = {
    type:"msg",
    name:name,
    text:text
  };

  ws.send(JSON.stringify(data));
  input.value = "";
}

// ===== 画像送信 =====
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    ws.send(JSON.stringify({
      type:"img",
      name:name,
      img:reader.result
    }));
  };
  reader.readAsDataURL(file);
};

// ===== メッセージ追加 =====
function addMessage(data){
  addMessageToUI(data);

  // 保存
  history.push(data);
  if (history.length > 100) history.shift();
  localStorage.setItem("chatHistory", JSON.stringify(history));
}

// ===== UI描画 =====
function addMessageToUI(data){
  let html = `<div class="msg"><span class="name">${escape(data.name)}</span>: `;

  if (data.type === "msg") {
    html += escape(data.text);
  }

  if (data.type === "img") {
    html += `<br><img src="${data.img}">`;
  }

  html += `</div>`;

  chat.innerHTML += html;
  chat.scrollTop = chat.scrollHeight;
}

// ===== エスケープ =====
function escape(str){
  return str.replace(/[&<>"']/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[s]));
}

// ===== Enter送信 =====
input.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
